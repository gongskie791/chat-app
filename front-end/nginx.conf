server{
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forward API requests (including WebSocket) to the backend container
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host   $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (required for /api/ws/* to work)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSockets are long-lived; raise the read timeout
        proxy_read_timeout 3600s;
    }

    # SPA fallback: any URL that doesn't match a file falls back to index.html
    # so React Router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}